{% extends 'base.html' %}

{% block content %}
<section class="container my-5" id="colorfondo">
    <h2 class="mb-4 text-center">¿Problemas con tu pedido? Contactanos!</h2>
        <div class="row justify-content-center">
        <div class="col-md-6">
<!-- FORMULARIO -->
    <form method="POST">
        {% csrf_token %}
<!-- Nombre -->
        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombre" placeholder="Tu nombre">
        </div>
<!-- Email -->
        <div class="mb-3">
            <label for="email" class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" id="email" placeholder="tu@correo.com">
        </div>
<!-- Mensaje -->
        <div class="mb-3">
            <label for="mensaje" class="form-label">Mensaje</label>
            <textarea class="form-control" id="mensaje" rows="4" placeholder="Escribe tu mensaje"></textarea>
        </div>
<!-- Botón -->
        <div class="text-center">
            <button type="submit" class="btn btn-brown px-4">Enviar</button>
        </div>
    </form>
{% endblock %}
